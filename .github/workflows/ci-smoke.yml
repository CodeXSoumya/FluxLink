name: CI Smoke Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for all services health
        shell: bash
        run: |
          set -euo pipefail

          check_url() {
            local url="$1"
            local label="$2"
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$label is healthy"
                return 0
              fi
              echo "Waiting for $label... ($i/60)"
              sleep 5
            done
            echo "$label did not become healthy in time"
            return 1
          }

          check_url http://localhost:8081/actuator/health app1
          check_url http://localhost:8082/actuator/health app2
          check_url http://localhost:8083/actuator/health app3
          check_url http://localhost:8080/actuator/health load-balancer

      - name: Wait for shorten endpoint readiness
        shell: bash
        run: |
          set -euo pipefail

          BODY='{"longUrl":"https://example.com/ready"}'
          for i in {1..60}; do
            CODE=$(curl -sS -o /tmp/ready.txt -w '%{http_code}' -X POST \
              -H 'Content-Type: application/json' \
              -H 'X-User-Id: 9001' \
              -d "$BODY" \
              http://localhost:8080/shorten || true)
            if [ "$CODE" = "200" ]; then
              echo "Shorten endpoint is ready"
              exit 0
            fi
            echo "Waiting for shorten endpoint... ($i/60), last code=$CODE"
            sleep 5
          done
          echo "Shorten endpoint did not become ready in time"
          cat /tmp/ready.txt || true
          docker compose ps
          exit 1

      - name: Smoke test shorten and redirect
        shell: bash
        run: |
          set -euo pipefail

          BODY='{"longUrl":"https://example.com/docs"}'
          CODE=$(curl -sS -o /tmp/shorten.json -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            -H 'X-User-Id: 101' \
            -d "$BODY" \
            http://localhost:8080/shorten)

          if [ "$CODE" != "200" ]; then
            echo "Expected 200 from /shorten, got $CODE"
            cat /tmp/shorten.json
            exit 1
          fi

          RESP=$(cat /tmp/shorten.json)

          echo "Shorten response: $RESP"

          export RESP
          SHORT_ID=$(python3 -c "import json, os; print(json.loads(os.environ['RESP']).get('shortId',''))")

          if [ -z "$SHORT_ID" ]; then
            echo "shortId missing in response"
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/headers.txt -D /tmp/headers.txt -w '%{http_code}' "http://localhost:8080/$SHORT_ID")
          if [ "$STATUS" != "302" ]; then
            echo "Expected 302 redirect, got $STATUS"
            cat /tmp/headers.txt
            exit 1
          fi

          if ! grep -qi '^Location: https://example.com/docs' /tmp/headers.txt; then
            echo "Redirect location mismatch"
            cat /tmp/headers.txt
            exit 1
          fi

      - name: Smoke test rate limit
        shell: bash
        run: |
          set -euo pipefail

          BODY='{"longUrl":"https://example.com/rate"}'
          USER=202
          HIT_429=0

          for i in {1..7}; do
            CODE=$(curl -sS -o /tmp/rl.txt -w '%{http_code}' -X POST \
              -H 'Content-Type: application/json' \
              -H "X-User-Id: $USER" \
              -d "$BODY" \
              http://localhost:8080/shorten)
            echo "Request $i -> $CODE"
            if [ "$CODE" = "429" ]; then
              HIT_429=1
              break
            fi
          done

          if [ "$HIT_429" -ne 1 ]; then
            echo "Expected at least one 429 after burst requests"
            exit 1
          fi

      - name: Service logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
