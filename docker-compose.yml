version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  load-balancer:
    build:
      context: .
      dockerfile: ./load-balancer/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - app1
      - app2
      - app3

  app1:
    build:
      context: .
      dockerfile: ./url-shortener/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shortener
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_PORT=8081
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"

  app2:
    build:
      context: .
      dockerfile: ./url-shortener/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shortener
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_PORT=8082
    depends_on:
      - postgres
      - redis
    ports:
      - "8082:8082"

  app3:
    build:
      context: .
      dockerfile: ./url-shortener/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shortener
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_PORT=8083
    depends_on:
      - postgres
      - redis
    ports:
      - "8083:8083"


volumes:
  postgres_data:
