server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: url-shortener
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shortener}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: aVerySecretKeyThatShouldBeStoredInEnvironmentVariableInsteadOfHardcodedLikeThisButThisIsAnExample1234567890
  expiration: 86400000 # 1 day

logging:
  level:
    org.springframework.web: INFO
    hibernate: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
